version: "3.9"

services:
  server:
    image: void-streaming-demo:0.1.0
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  hf_cache:
