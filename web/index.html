<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speaker Engine Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- Layout: left(1) : right(3) ---- */
    #app {
      display: grid;
      grid-template-columns: 1fr 3fr;
      height: 100vh;
      gap: 2px;
      background: #21262d;
      padding: 2px;
    }

    /* Left column: top(1) : bottom(1) */
    #left-col {
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      gap: 2px;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    /* Right column: top(1) : mid(1) : bottom(1) */
    #right-col {
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
      gap: 2px;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      min-width: 0;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #58a6ff;
      margin-bottom: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid #21262d;
      padding-bottom: 8px;
    }

    /* ---- 좌-상: 음성 업로드 ---- */
    .file-label {
      display: inline-block;
      padding: 6px 14px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #c9d1d9;
      transition: background 0.15s, border-color 0.15s;
      align-self: flex-start;
    }
    .file-label:hover { background: #30363d; border-color: #58a6ff; }

    #file-input { display: none; }

    #filename {
      font-size: 12px;
      color: #8b949e;
      margin-top: 8px;
      word-break: break-all;
      font-family: 'SF Mono', Consolas, monospace;
    }
    #filename.active { color: #58a6ff; }

    #start-btn {
      margin-top: auto;
      padding: 8px 0;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #start-btn:hover:not(:disabled) { background: #2ea043; }
    #start-btn:disabled {
      background: #21262d;
      border-color: #30363d;
      color: #8b949e;
      cursor: not-allowed;
    }

    #status {
      font-size: 11px;
      color: #8b949e;
      margin-top: 6px;
      min-height: 16px;
      flex-shrink: 0;
    }

    /* ---- 좌-하: 음성 재생 ---- */
    #audio-player {
      margin-top: auto;
      width: 100%;
    }

    /* ---- Feed (우측 3 패널 공통) ---- */
    .feed {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    /* 우-상 STT */
    .stt-row {
      font-size: 13px;
      color: #c9d1d9;
      line-height: 1.5;
      padding: 3px 0;
      border-bottom: 1px solid #21262d;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .stt-partial {
      color: #8b949e;
      font-style: italic;
      opacity: 0.7;
    }
    .stt-final {
      color: #c9d1d9;
      font-style: normal;
      opacity: 1;
    }

    /* 우-중 매핑 */
    .map-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      border-bottom: 1px solid #21262d;
    }

    /* 우-하 최종 */
    .final-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 3px 0;
      border-bottom: 1px solid #21262d;
    }

    .label-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      color: #fff;
      flex-shrink: 0;
      font-family: 'SF Mono', Consolas, monospace;
      white-space: nowrap;
    }

    .time-str {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 11px;
      color: #8b949e;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .text-str {
      font-size: 13px;
      color: #c9d1d9;
      word-break: break-word;
    }

    /* 우-하 done 요약 */
    .done-section { margin-top: 8px; padding-top: 8px; }

    .done-header {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      color: #3fb950;
      margin-bottom: 6px;
    }

    .done-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 12px;
      color: #c9d1d9;
      padding: 2px 0;
    }

    /* 에러 */
    .error-toast {
      font-size: 12px;
      color: #f85149;
      padding: 6px 10px;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: 4px;
      margin-top: 4px;
    }

    /* ---- 좌-하: 웨이브폼 canvas + RMS (T-005b) ---- */
    #waveform-canvas {
      display: block;
      width: 100%;
      height: 70px;
      background: #0d1117;
      border-radius: 4px;
      margin-top: 8px;
      flex-shrink: 0;
    }

    #rms-value {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 11px;
      color: #8b949e;
      margin-top: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Left column -->
    <div id="left-col">
      <!-- 좌-상: 음성 업로드 -->
      <div class="panel" id="upload-panel">
        <div class="panel-title">음성 업로드</div>
        <label class="file-label" for="file-input">파일 선택</label>
        <input type="file" id="file-input" accept=".wav,.mp3,.m4a">
        <div id="filename">선택된 파일 없음</div>
        <button id="start-btn" disabled>재생 + 분석 시작</button>
        <div id="status"></div>
      </div>
      <!-- 좌-하: 음성 재생 -->
      <div class="panel" id="playback-panel">
        <div class="panel-title">음성 재생</div>
        <audio id="audio-player" controls></audio>
        <canvas id="waveform-canvas" height="70"></canvas>
        <span id="rms-value">RMS 0.00</span>
      </div>
    </div>

    <!-- Right column -->
    <div id="right-col">
      <!-- 우-상: STT -->
      <div class="panel" id="stt-panel">
        <div class="panel-title">STT</div>
        <div class="feed" id="stt-feed"></div>
      </div>
      <!-- 우-중: 매핑 결과 -->
      <div class="panel" id="mapping-panel">
        <div class="panel-title">매핑 결과</div>
        <div class="feed" id="mapping-feed"></div>
      </div>
      <!-- 우-하: 최종 STT + 매핑 -->
      <div class="panel" id="final-panel">
        <div class="panel-title">최종 STT + 매핑</div>
        <div class="feed" id="final-feed"></div>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    /* ---- Speaker color palette (8색, planning-03 §5) ---- */
    const PALETTE = [
      '#1f6feb', '#e67e22', '#27ae60', '#9b59b6',
      '#e74c3c', '#16a085', '#d35400', '#2c3e50',
    ];
    const _clrCache = Object.create(null);
    function labelColor(label) {
      if (_clrCache[label]) return _clrCache[label];
      let h = 0;
      for (let i = 0; i < label.length; i++) h = (Math.imul(31, h) + label.charCodeAt(i)) | 0;
      const c = PALETTE[Math.abs(h) % PALETTE.length];
      _clrCache[label] = c;
      return c;
    }

    function fmtT(t) { return (+t).toFixed(1) + 's'; }

    /* ---- WAV encoder — §OQ-07-2 option A (OfflineAudioContext resample, 재생 전 1회) ---- */
    function encodeWav(f32, sampleRate) {
      const dataLen = f32.length * 2;
      const buf = new ArrayBuffer(44 + dataLen);
      const v = new DataView(buf);
      const w = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
      w(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true);
      w(8, 'WAVE');
      w(12, 'fmt ');  v.setUint32(16, 16, true);
      v.setUint16(20, 1, true);              // PCM
      v.setUint16(22, 1, true);              // mono
      v.setUint32(24, sampleRate, true);
      v.setUint32(28, sampleRate * 2, true); // byte rate
      v.setUint16(32, 2, true);              // block align
      v.setUint16(34, 16, true);             // bits per sample
      w(36, 'data'); v.setUint32(40, dataLen, true);
      const pcm = new Int16Array(buf, 44);
      for (let i = 0; i < f32.length; i++) {
        const s = f32[i] < -1 ? -1 : f32[i] > 1 ? 1 : f32[i];
        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return new Blob([buf], { type: 'audio/wav' });
    }

    /* ---- DOM refs ---- */
    const fileInput   = document.getElementById('file-input');
    const filenameEl  = document.getElementById('filename');
    const startBtn    = document.getElementById('start-btn');
    const statusEl    = document.getElementById('status');
    const audioPlayer = document.getElementById('audio-player');
    const sttFeed     = document.getElementById('stt-feed');
    const mapFeed     = document.getElementById('mapping-feed');
    const finalFeed   = document.getElementById('final-feed');

    /* ---- State ---- */
    let _pcmBlobUrl  = null;    // 16kHz WAV blob URL (audio.src)
    let _ws          = null;
    let _partialEl   = null;    // 우-상 STT 마지막 partial DOM node (null이면 새 row 생성)
    let _audioReady  = false;   // true after resample completes

    // Web Audio nodes — created once (createMediaElementSource: 1 call per element)
    let _audioCtx    = null;
    let _mediaSource = null;
    let _worklet     = null;
    let _analyser    = null;
    let _analyserBuf = null;
    let _rafId       = null;

    /* ---- File selection: decode + resample 16kHz + WAV encode ---- */
    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      filenameEl.textContent = file.name;
      filenameEl.classList.add('active');
      startBtn.disabled = true;
      _audioReady = false;
      setStatus('디코딩 중...');

      try {
        const tmpCtx = new AudioContext();
        let decoded;
        try {
          decoded = await tmpCtx.decodeAudioData(await file.arrayBuffer());
        } finally {
          tmpCtx.close();
        }

        // Mono mixdown + 16kHz resample (OfflineAudioContext — §OQ-07-2 option A)
        setStatus('16kHz 리샘플링 중...');
        const offCtx = new OfflineAudioContext(1, Math.ceil(decoded.duration * 16000), 16000);
        const bufSrc = offCtx.createBufferSource();
        bufSrc.buffer = decoded;
        bufSrc.connect(offCtx.destination);
        bufSrc.start(0);
        const resampled = await offCtx.startRendering();

        // Encode as 16kHz WAV → set audio.src
        if (_pcmBlobUrl) URL.revokeObjectURL(_pcmBlobUrl);
        _pcmBlobUrl = URL.createObjectURL(encodeWav(resampled.getChannelData(0), 16000));
        audioPlayer.src = _pcmBlobUrl;
        audioPlayer.currentTime = 0;

        _audioReady = true;
        startBtn.disabled = false;
        setStatus('파일 준비 완료');
      } catch (err) {
        appendError(finalFeed, '디코딩 오류: ' + err.message);
        setStatus('오류');
      }
    });

    /* ---- [재생 + 분석 시작] button ---- */
    startBtn.addEventListener('click', async () => {
      if (!_audioReady || _ws) return;
      startBtn.disabled = true;
      clearFeeds();
      try {
        await initAudio();         // no-op if already initialized
        audioPlayer.currentTime = 0;
        openWs();
        // WS open 대기 후 재생 — 첫 청크 유실 방지 (spec-07 §5)
        await new Promise((resolve, reject) => {
          _ws.addEventListener('open', resolve, { once: true });
          _ws.addEventListener('error', () => reject(new Error('WebSocket 연결 실패')), { once: true });
        });
        await audioPlayer.play();
      } catch (err) {
        appendError(finalFeed, '시작 오류: ' + err.message);
        setStatus('오류');
        startBtn.disabled = false;
        if (_ws) { _ws.close(); _ws = null; }
      }
    });

    /* ---- Web Audio init (once per page) ---- */
    async function initAudio() {
      if (_audioCtx) return;
      const ctx = new AudioContext({ sampleRate: 16000 });
      // sampleRate 미지원 시 차단 — 잘못된 rate PCM 송신 방지
      if (ctx.sampleRate !== 16000) {
        ctx.close();
        throw new Error('브라우저가 16kHz AudioContext 미지원 (sampleRate: ' + ctx.sampleRate + ')');
      }
      _audioCtx = ctx;
      waveCanvas.width = waveCanvas.offsetWidth || waveCanvas.clientWidth || 300;

      // worklet-processor.js: web/ → / 마운트이므로 절대경로
      await _audioCtx.audioWorklet.addModule('/worklet-processor.js');

      // createMediaElementSource: audio element 당 1회만
      _mediaSource = _audioCtx.createMediaElementSource(audioPlayer);
      _worklet     = new AudioWorkletNode(_audioCtx, 'pcm-capture-processor');
      _analyser    = _audioCtx.createAnalyser();
      _analyser.fftSize = 1024;
      _analyserBuf = new Float32Array(_analyser.fftSize);

      // 4-way: source → worklet + analyser + destination (T-005b 보존)
      _mediaSource.connect(_worklet);
      _mediaSource.connect(_analyser);
      _mediaSource.connect(_audioCtx.destination);

      // AudioWorklet → WS 바이너리 송신
      _worklet.port.onmessage = (ev) => {
        if (_ws && _ws.readyState === WebSocket.OPEN) _ws.send(ev.data);
      };
    }

    /* ---- WS open ---- */
    function openWs() {
      const visitId = typeof crypto.randomUUID === 'function'
        ? crypto.randomUUID() : String(Date.now());
      const ws = new WebSocket('ws://' + location.host + '/audio/' + visitId);
      ws.binaryType = 'arraybuffer';
      _ws = ws;
      ws.onmessage = handleMsg;
      ws.onclose = () => {
        _ws = null;
        if (statusEl.textContent !== '완료' && statusEl.textContent !== '오류') {
          setStatus('연결 종료');
        }
        startBtn.disabled = false;
      };
      setStatus('연결 중...');
    }

    /* ---- Audio element events (play/pause/ended — master clock) ---- */
    audioPlayer.addEventListener('play', () => {
      if (_audioCtx) _audioCtx.resume(); // user gesture 후 resume (autoplay 정책)
      setStatus('전송 중...');
      if (_rafId) cancelAnimationFrame(_rafId);
      drawWave();
    });

    audioPlayer.addEventListener('pause', () => {
      if (_audioCtx) _audioCtx.suspend(); // worklet 자동 정지 → WS 송신 중단
    });

    audioPlayer.addEventListener('ended', () => {
      // spec-07 §2: audio.ended → eof 송신 → done 수신 대기 → WS close
      if (_ws && _ws.readyState === WebSocket.OPEN) {
        _ws.send(JSON.stringify({ type: 'eof' }));
        setStatus('처리 대기 중...');
      }
    });

    /* ---- WS 메시지 핸들러 (PLAN-006-T-005) ---- */
    function handleMsg(event) {
      let msg;
      try { msg = JSON.parse(event.data); } catch {
        console.warn('[demo-ui] JSON parse error:', event.data);
        return;
      }
      switch (msg.type) {
        case 'stt':            onStt(msg);           break;
        case 'labeled_phrase': onLabeledPhrase(msg); break;
        case 'final_grouped':  onFinalGrouped(msg);  break;
        case 'done':           onDone(msg);          break;
        case 'error':
          appendError(finalFeed, '서버 오류: ' + (msg.message || ''));
          break;
        default:
          console.warn('[demo-ui] unknown message type:', msg.type);
      }
    }

    function onStt(msg) {
      const { text, is_final } = msg;

      if (is_final) {
        if (_partialEl) {
          // 마지막 partial row를 final로 확정 (덮어쓰기)
          _partialEl.textContent = text;
          _partialEl.className = 'stt-row stt-final';
          _partialEl = null;
        } else if (text && text.trim()) {
          // partial 없이 final 직접 도착 (edge)
          const row = document.createElement('div');
          row.className = 'stt-row stt-final';
          row.textContent = text;
          sttFeed.appendChild(row);
        }
      } else {
        if (!_partialEl) {
          _partialEl = document.createElement('div');
          _partialEl.className = 'stt-row stt-partial';
          sttFeed.appendChild(_partialEl);
        }
        _partialEl.textContent = text;
      }
      scrollBot(sttFeed);
    }

    /* labeled_phrase: 우-중 매핑 영역 — 같은 label 연속이면 concat, 다른 label 이면 새 row */
    function formatLabel(label) {
      const colon = label.indexOf(':');
      return colon !== -1 ? label.slice(colon + 1) : label;
    }

    function onLabeledPhrase(msg) {
      const { label, text } = msg;
      const displayName = formatLabel(label);
      const last = mapFeed.lastElementChild;
      if (last && last.dataset.label === label) {
        const txt = last.querySelector('.text-str');
        txt.textContent = (txt.textContent || '') + ' ' + text;
      } else {
        const row = document.createElement('div');
        row.className = 'map-row';
        row.dataset.label = label;
        row.appendChild(makeBadge(displayName, labelColor(label)));
        const txt = document.createElement('span');
        txt.className = 'text-str';
        txt.textContent = text;
        row.appendChild(txt);
        mapFeed.appendChild(row);
      }
      scrollBot(mapFeed);
    }

    /* final_grouped: 우-하 최종 영역 — wipe + utterance 단위 재구성 */
    function onFinalGrouped(msg) {
      const { utterances = [] } = msg;
      finalFeed.innerHTML = '';
      for (const utt of utterances) {
        const row = document.createElement('div');
        row.className = 'final-row';
        row.appendChild(makeBadge(utt.label, labelColor(utt.label)));
        const time = document.createElement('span');
        time.className = 'time-str';
        time.textContent = fmtT(utt.t_start) + '–' + fmtT(utt.t_end);
        row.appendChild(time);
        const txt = document.createElement('span');
        txt.className = 'text-str';
        txt.textContent = utt.text;
        row.appendChild(txt);
        finalFeed.appendChild(row);
      }
      scrollBot(finalFeed);
    }

    function onDone(msg) {
      setStatus('완료');

      const section = document.createElement('div');
      section.className = 'done-section';
      const header = document.createElement('div');
      header.className = 'done-header';
      header.textContent = '[종료]';
      section.appendChild(header);
      finalFeed.appendChild(section);
      scrollBot(finalFeed);

      if (_ws) { _ws.close(); _ws = null; }
    }

    /* ---- Helpers ---- */
    function makeBadge(label, color) {
      const span = document.createElement('span');
      span.className = 'label-badge';
      span.style.background = color;
      span.textContent = '[' + label + ']';
      return span;
    }

    function clearFeeds() {
      sttFeed.innerHTML = '';
      mapFeed.innerHTML = '';
      finalFeed.innerHTML = '';
      _partialEl = null;
    }

    function scrollBot(el) { el.scrollTop = el.scrollHeight; }

    function setStatus(msg) { statusEl.textContent = msg; }

    function appendError(parent, msg) {
      const el = document.createElement('div');
      el.className = 'error-toast';
      el.textContent = msg;
      parent.appendChild(el);
      scrollBot(parent);
    }

    /* ---- 웨이브폼 + RMS (T-005b 보존) ---- */
    const waveCanvas = document.getElementById('waveform-canvas');
    const waveCtx2d  = waveCanvas.getContext('2d');
    const rmsEl      = document.getElementById('rms-value');

    function drawWave() {
      if (!_analyser) return;
      if (audioPlayer.paused) { _rafId = null; return; } // 정지 시 RAF 중단

      _analyser.getFloatTimeDomainData(_analyserBuf);

      const w = waveCanvas.width;
      const h = waveCanvas.height;
      waveCtx2d.clearRect(0, 0, w, h);
      waveCtx2d.beginPath();
      waveCtx2d.strokeStyle = '#58a6ff';
      waveCtx2d.lineWidth = 1.5;
      for (let i = 0; i < _analyserBuf.length; i++) {
        const x = (i / _analyserBuf.length) * w;
        const y = (1 - _analyserBuf[i]) * 0.5 * h;
        i === 0 ? waveCtx2d.moveTo(x, y) : waveCtx2d.lineTo(x, y);
      }
      waveCtx2d.stroke();

      let sq = 0;
      for (let i = 0; i < _analyserBuf.length; i++) sq += _analyserBuf[i] * _analyserBuf[i];
      rmsEl.textContent = 'RMS ' + Math.sqrt(sq / _analyserBuf.length).toFixed(2);

      _rafId = requestAnimationFrame(drawWave);
    }
  </script>
</body>
</html>
